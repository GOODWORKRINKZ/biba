name: "G: Build All"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: Push image to GHCR after successful build
        required: false
        default: true
        type: boolean
      image_tag:
        description: Optional extra image tag for manual builds
        required: false
        default: ""
        type: string

jobs:
  build-controller-image:
    uses: ./.github/workflows/G-Build-Controller-Image.yml
    permissions:
      contents: read
      packages: write
    with:
      push_to_registry: ${{ github.event_name != 'workflow_dispatch' || inputs.push_to_registry }}
      image_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
    secrets: inherit

  build-stm32-firmware:
    uses: ./.github/workflows/G-Build-STM32F103.yml
    permissions:
      contents: read
    secrets: inherit

  build-ros2-bases:
    uses: ./.github/workflows/G-Build-ROS2-Bases.yml
    permissions:
      contents: read
      packages: write
    with:
      push_to_registry: ${{ github.event_name != 'workflow_dispatch' || inputs.push_to_registry }}
      image_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
    secrets: inherit

  build-ros2-stack:
    needs: build-ros2-bases
    uses: ./.github/workflows/G-Build-ROS2-Stack.yml
    permissions:
      contents: read
      packages: write
    with:
      push_to_registry: ${{ github.event_name != 'workflow_dispatch' || inputs.push_to_registry }}
      image_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
    secrets: inherit

  verify-all:
    name: Verify Build Pipeline
    runs-on: ubuntu-latest
    needs:
      - build-controller-image
      - build-stm32-firmware
      - build-ros2-bases
      - build-ros2-stack
    steps:
      - name: Build completed
        run: |
          echo "BiBa controller pipeline finished successfully."
          echo "STM32F103 firmware artefacts produced for all target/mode combinations."
          echo "ROS2 base images (zenoh + control) ready in GHCR when push is enabled."
          echo "ROS2 stack image (biba-ros2) ready in GHCR when push is enabled."
          echo "Global arm64 image is ready in GHCR when push is enabled."
