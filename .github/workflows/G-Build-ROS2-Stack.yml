name: "G: Build ROS2 Stack Image"

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - "docker/ros2/Dockerfile"
      - "ros2_ws/**"
      - "biba-controller/stm32_link/**"
      - "biba-controller/requirements.txt"
      - ".github/workflows/G-Build-ROS2-Stack.yml"
  pull_request:
    paths:
      - "docker/ros2/Dockerfile"
      - "ros2_ws/**"
      - "biba-controller/stm32_link/**"
      - "biba-controller/requirements.txt"
      - ".github/workflows/G-Build-ROS2-Stack.yml"
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: Push image to GHCR after successful build
        required: false
        default: true
        type: boolean
      image_tag:
        description: Optional extra image tag for manual builds
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      push_to_registry:
        description: Push image to GHCR after successful build
        required: false
        default: true
        type: boolean
      image_tag:
        description: Optional extra image tag for manual builds
        required: false
        default: ""
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/goodworkrinkz/biba/biba-ros2
  BASE_IMAGE: ghcr.io/goodworkrinkz/biba/biba-ros2-control

permissions:
  contents: read
  packages: write

jobs:
  determine-tag:
    name: Determine Docker Tag
    runs-on: ubuntu-latest
    outputs:
      docker_tag: ${{ steps.set-tag.outputs.docker_tag }}
    steps:
      - name: Determine tag
        id: set-tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            if [ "$BRANCH_NAME" = "main" ]; then
              TAG="latest"
            elif [ "$BRANCH_NAME" = "develop" ]; then
              TAG="dev"
            else
              TAG="test"
            fi
          fi
          echo "docker_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved Docker tag: ${TAG}"

  build-ros2-stack:
    name: Build biba-ros2 service image
    needs: determine-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_to_registry)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.determine-tag.outputs.docker_tag }}
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ros2/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_to_registry) }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            BASE_TAG=${{ needs.determine-tag.outputs.docker_tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ros2-stack
          cache-to: type=gha,mode=max,scope=ros2-stack
