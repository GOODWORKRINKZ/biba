name: "G: Build STM32F103 firmware"

on:
  push:
    branches:
      - main
    paths:
      - "firmware/**"
      - ".github/workflows/G-Build-STM32F103.yml"
  pull_request:
    paths:
      - "firmware/**"
      - ".github/workflows/G-Build-STM32F103.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  host-tests:
    name: Native unit tests (pio test -e native_test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-native-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            pio-native-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Run native test env
        working-directory: firmware
        run: pio test -e native_test

  firmware-build:
    name: ${{ matrix.target }} / ${{ matrix.mode }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [bluepill_f103c8, biba_f103_rev_a]
        mode: [standalone, companion, combined]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-fw-${{ matrix.target }}-${{ matrix.mode }}-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            pio-fw-${{ matrix.target }}-${{ matrix.mode }}-${{ runner.os }}-
            pio-fw-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build ${{ matrix.target }}_${{ matrix.mode }}
        working-directory: firmware
        run: pio run -e ${{ matrix.target }}_${{ matrix.mode }}

      - name: Upload firmware artefact
        uses: actions/upload-artifact@v4
        with:
          name: biba-stm32f103-${{ matrix.target }}-${{ matrix.mode }}
          path: |
            firmware/.pio/build/${{ matrix.target }}_${{ matrix.mode }}/firmware.bin
            firmware/.pio/build/${{ matrix.target }}_${{ matrix.mode }}/firmware.elf
          if-no-files-found: warn
          retention-days: 14
