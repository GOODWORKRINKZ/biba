    <text class="ascii-letter" x="600" y="68" xml:space="preserve">
      <tspan x="600" dy="00">╔═════════════════════════════════════════════╗</tspan>
      <tspan x="600" dy="30">║  ███████╗  ██╗   ███╗  ███████╗  █████╗     ║</tspan>
      <tspan x="600" dy="30">║  ██╔════╝  ██║  ████║  ██╔════╝ ██╔══██╗    ║</tspan>
      <tspan x="600" dy="30">║  ██████╗   ██║ ██╔██║  ██████╗  ███████║    ║</tspan>
      <tspan x="600" dy="30">║  ██╔══██╗  ██║██╔╝██║  ██╔══██╗ ██╔══██║    ║</tspan>
      <tspan x="600" dy="30">║  ██████╔╝  ████╔╝ ██║  ██████╔╝ ██║  ██║    ║</tspan>
      <tspan x="600" dy="30">║  ╚═════╝   ╚═══╝  ╚═╝  ╚═════╝  ╚═╝  ╚═╝    ║</tspan>
      <tspan x="600" dy="30">╚═════════════════════════════════════════════╝</tspan>
    </text>
  </g>

  <g id="letter-b2" class="segment" clip-path="url(#clip-b2)">
    <text class="ascii-letter" x="600" y="68" xml:space="preserve">
      <tspan x="600" dy="00">╔═════════════════════════════════════════════╗</tspan>
      <tspan x="600" dy="30">║  ███████╗  ██╗   ███╗  ███████╗  █████╗     ║</tspan>
      <tspan x="600" dy="30">║  ██╔════╝  ██║  ████║  ██╔════╝ ██╔══██╗    ║</tspan>
      <tspan x="600" dy="30">║  ██████╗   ██║ ██╔██║  ██████╗  ███████║    ║</tspan>
      <tspan x="600" dy="30">║  ██╔══██╗  ██║██╔╝██║  ██╔══██╗ ██╔══██║    ║</tspan>
      <tspan x="600" dy="30">║  ██████╔╝  ████╔╝ ██║  ██████╔╝ ██║  ██║    ║</tspan>
      <tspan x="600" dy="30">║  ╚═════╝   ╚═══╝  ╚═╝  ╚═════╝  ╚═╝  ╚═╝    ║</tspan>
      <tspan x="600" dy="30">╚═════════════════════════════════════════════╝</tspan>
    </text>
  </g>

  <g id="letter-a" class="segment" clip-path="url(#clip-a)">
    <text class="ascii-letter" x="600" y="68" xml:space="preserve">
      <tspan x="600" dy="00">╔═════════════════════════════════════════════╗</tspan>
      <tspan x="600" dy="30">║  ███████╗  ██╗   ███╗  ███████╗  █████╗     ║</tspan>
      <tspan x="600" dy="30">║  ██╔════╝  ██║  ████║  ██╔════╝ ██╔══██╗    ║</tspan>
      <tspan x="600" dy="30">║  ██████╗   ██║ ██╔██║  ██████╗  ███████║    ║</tspan>
      <tspan x="600" dy="30">║  ██╔══██╗  ██║██╔╝██║  ██╔══██╗ ██╔══██║    ║</tspan>
      <tspan x="600" dy="30">║  ██████╔╝  ████╔╝ ██║  ██████╔╝ ██║  ██║    ║</tspan>
      <tspan x="600" dy="30">║  ╚═════╝   ╚═══╝  ╚═╝  ╚═════╝  ╚═╝  ╚═╝    ║</tspan>
      <tspan x="600" dy="30">╚═════════════════════════════════════════════╝</tspan>
