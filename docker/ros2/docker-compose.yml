# BiBa ROS2 stack — minimal profile for composition C (Pi + STM32).
#
# Запускает:
#   - zenoh-router        : бутстрап discovery для всех ROS2-узлов
#   - biba-stm32-bridge   : SPI ↔ ROS2 (cmd_vel / telemetry / arm)
#   - robot-state-publisher : публикует TF из biba_description URDF
#
# Использование:
#   cd docker/ros2
#   cp .env.example .env       # подкрутить BIBA_IMAGE_TAG, ROS_DOMAIN_ID
#   docker compose pull        # подтянуть образ из GHCR
#   docker compose up -d
#
# Собрать локально (без push):
#   docker compose build
#
# Образ строится из корня репозитория, чтобы внутрь попали и
# ros2_ws/, и biba-controller/stm32_link/.

x-biba-ros2-image: &biba_ros2_image
  image: ghcr.io/goodworkrinkz/biba/biba-ros2:${BIBA_ROS2_IMAGE_TAG:-latest}
  build:
    context: ../..
    dockerfile: docker/ros2/Dockerfile
    args:
      BASE_IMAGE: ${BIBA_BASE_IMAGE:-ghcr.io/goodworkrinkz/biba/biba-ros2-control}
      BASE_TAG: ${BIBA_BASE_TAG:-latest}

x-biba-ros2-env: &biba_ros2_env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-42}
  RMW_IMPLEMENTATION: rmw_zenoh_cpp
  ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE:-LOCALHOST}
  ZENOH_ROUTER_CHECK_ATTEMPTS: "-1"

services:
  zenoh-router:
    <<: *biba_ros2_image
    pull_policy: always
    restart: unless-stopped
    network_mode: host
    environment:
      <<: *biba_ros2_env
    command:
      - bash
      - -lc
      - "source /opt/ros/humble/setup.bash && ros2 run rmw_zenoh_cpp rmw_zenohd"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'rmw_zenohd' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  biba-stm32-bridge:
    <<: *biba_ros2_image
    pull_policy: always
    restart: unless-stopped
    network_mode: host
    depends_on:
      zenoh-router:
        condition: service_healthy
    devices:
      - /dev/spidev0.0:/dev/spidev0.0
    environment:
      <<: *biba_ros2_env
      BIBA_WHEEL_SEPARATION: ${BIBA_WHEEL_SEPARATION:-0.30}
      BIBA_MAX_WHEEL_SPEED: ${BIBA_MAX_WHEEL_SPEED:-1.0}
      BIBA_SETPOINT_RATE_HZ: ${BIBA_SETPOINT_RATE_HZ:-50.0}
      BIBA_TELEMETRY_RATE_HZ: ${BIBA_TELEMETRY_RATE_HZ:-20.0}
      BIBA_CMD_VEL_TIMEOUT_SEC: ${BIBA_CMD_VEL_TIMEOUT_SEC:-0.5}
    command:
      - bash
      - -lc
      - >-
        source /opt/ros/humble/setup.bash &&
        source /opt/biba/ros2_ws/install/setup.bash &&
        ros2 run biba_stm32_bridge biba_stm32_bridge_node
        --ros-args
        -p wheel_separation:=${BIBA_WHEEL_SEPARATION:-0.30}
        -p max_wheel_speed:=${BIBA_MAX_WHEEL_SPEED:-1.0}
        -p setpoint_rate_hz:=${BIBA_SETPOINT_RATE_HZ:-50.0}
        -p telemetry_rate_hz:=${BIBA_TELEMETRY_RATE_HZ:-20.0}
        -p cmd_vel_timeout_sec:=${BIBA_CMD_VEL_TIMEOUT_SEC:-0.5}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'biba_stm32_bridge_node' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  robot-state-publisher:
    <<: *biba_ros2_image
    pull_policy: always
    restart: unless-stopped
    network_mode: host
    depends_on:
      zenoh-router:
        condition: service_healthy
    environment:
      <<: *biba_ros2_env
    command:
      - bash
      - -lc
      - >-
        source /opt/ros/humble/setup.bash &&
        source /opt/biba/ros2_ws/install/setup.bash &&
        ros2 launch biba_description robot_state_publisher.launch.py
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'robot_state_publisher' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
