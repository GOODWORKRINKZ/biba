; PlatformIO configuration for the BiBa STM32F103C8T6 firmware.
;
; Envs:
;   standalone  - STM32 owns CRSF + motor control stack
;   companion   - STM32 is an SPI slave to the Raspberry Pi
;   combined    - Both modes in one binary, selected at boot via MODE_SEL
;   native_test - Host-side unit tests over the portable modules
;
; See firmware/stm32f103/README.md for how to build and flash each env.

[platformio]
default_envs = standalone, companion, combined

[common]
build_flags =
    -std=gnu11
    -Wall
    -Wextra
    -Wpedantic
    -Iinclude
    -Isrc
build_src_filter =
    +<*>
    -<hal/>
    -<drivers/>
    -<modes/>
    -<main.c>
    -<app/telemetry.c>
    +<drivers/crsf.c>

[env]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200

[fw_common]
build_src_filter =
    +<*>
build_flags =
    -std=gnu11
    -Wall
    -Wextra
    -Iinclude
    -Isrc
    -DHSE_VALUE=8000000

[env:standalone]
extends = env, fw_common
build_flags = ${fw_common.build_flags} -DBIBA_MODE_STANDALONE

[env:companion]
extends = env, fw_common
build_flags = ${fw_common.build_flags} -DBIBA_MODE_COMPANION

[env:combined]
extends = env, fw_common
build_flags = ${fw_common.build_flags} -DBIBA_MODE_COMBINED

[env:native_test]
platform = native
test_framework = unity
; Native env only compiles the portable (hardware-independent) modules.
build_src_filter = ${common.build_src_filter}
build_flags =
    ${common.build_flags}
    -DBIBA_NATIVE_TEST
test_build_src = yes
