; PlatformIO configuration for the BiBa STM32F103 firmware.
;
; The project follows a Betaflight/ELRS-style target layout: every
; supported hardware configuration lives under `targets/<TARGET>/` and
; is combined with every firmware mode (standalone / companion /
; combined) into an env named `<target_lowercase>_<mode>`.
;
; See firmware/README.md and firmware/targets/README.md
; for how to build, flash, and add new targets.

[platformio]
default_envs =
    bluepill_f103c8_standalone
    bluepill_f103c8_companion
    bluepill_f103c8_combined

; --- Common --------------------------------------------------------------

[common]
build_flags =
    -std=gnu11
    -Wall
    -Wextra
    -Wpedantic
    -Iinclude
    -Isrc
build_src_filter =
    +<*>
    -<hal/>
    -<drivers/>
    -<modes/>
    -<main.c>
    -<app/telemetry.c>
    +<drivers/crsf.c>

[env]
platform = ststm32
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
debug_extra_cmds =
    monitor arm semihosting enable

[fw_common]
build_src_filter =
    +<*>
build_flags =
    -std=gnu11
    -Wall
    -Wextra
    -Iinclude
    -Isrc
    -Isrc/proto
    -DHSE_VALUE=8000000

; --- Modes ---------------------------------------------------------------

[mode_standalone]
build_flags = -DBIBA_MODE_STANDALONE

[mode_companion]
build_flags = -DBIBA_MODE_COMPANION

[mode_combined]
build_flags = -DBIBA_MODE_COMBINED

; --- Targets -------------------------------------------------------------
;
; Each target stanza captures:
;   - `board`          PlatformIO board id
;   - `target_include` include path that contains `target.h` / `target_config.h`
;   - `build_flags`    -DBIBA_TARGET_<NAME> tag, useful in #if checks
;
; Env blocks further below glue `fw_common + <target> + <mode>` together.

[target_bluepill_f103c8]
board = bluepill_f103c8
target_include = targets/BLUEPILL_F103C8
build_flags = -DBIBA_TARGET_BLUEPILL_F103C8=1

[target_biba_f103_rev_a]
board = genericSTM32F103C8
target_include = targets/BIBA_F103_REV_A
build_flags = -DBIBA_TARGET_BIBA_F103_REV_A=1

; --- Envs: BLUEPILL_F103C8 ----------------------------------------------

[env:bluepill_f103c8_standalone]
extends = env, fw_common
board = ${target_bluepill_f103c8.board}
build_flags =
    ${fw_common.build_flags}
    -I${target_bluepill_f103c8.target_include}
    ${target_bluepill_f103c8.build_flags}
    ${mode_standalone.build_flags}

[env:bluepill_f103c8_companion]
extends = env, fw_common
board = ${target_bluepill_f103c8.board}
build_flags =
    ${fw_common.build_flags}
    -I${target_bluepill_f103c8.target_include}
    ${target_bluepill_f103c8.build_flags}
    ${mode_companion.build_flags}

[env:bluepill_f103c8_combined]
extends = env, fw_common
board = ${target_bluepill_f103c8.board}
build_flags =
    ${fw_common.build_flags}
    -I${target_bluepill_f103c8.target_include}
    ${target_bluepill_f103c8.build_flags}
    ${mode_combined.build_flags}

; --- Envs: BIBA_F103_REV_A ----------------------------------------------

[env:biba_f103_rev_a_standalone]
extends = env, fw_common
board = ${target_biba_f103_rev_a.board}
build_flags =
    ${fw_common.build_flags}
    -I${target_biba_f103_rev_a.target_include}
    ${target_biba_f103_rev_a.build_flags}
    ${mode_standalone.build_flags}

[env:biba_f103_rev_a_companion]
extends = env, fw_common
board = ${target_biba_f103_rev_a.board}
build_flags =
    ${fw_common.build_flags}
    -I${target_biba_f103_rev_a.target_include}
    ${target_biba_f103_rev_a.build_flags}
    ${mode_companion.build_flags}

[env:biba_f103_rev_a_combined]
extends = env, fw_common
board = ${target_biba_f103_rev_a.board}
build_flags =
    ${fw_common.build_flags}
    -I${target_biba_f103_rev_a.target_include}
    ${target_biba_f103_rev_a.build_flags}
    ${mode_combined.build_flags}

; --- Native host tests ---------------------------------------------------

[env:native_test]
platform = native
framework =
test_framework = unity
lib_deps = throwtheswitch/Unity@^2.6.1
test_ignore = test_support
; Native env only compiles the portable (hardware-independent) modules.
; No target include path is needed because the portable code never
; touches target.h (it is guarded behind the hardware-specific code
; excluded by build_src_filter above).
build_src_filter = ${common.build_src_filter}
build_flags =
    ${common.build_flags}
    -Isrc/proto
    -Isrc/app
    -Isrc/drivers
    -Itest/test_support
    -DBIBA_NATIVE_TEST
test_build_src = yes
