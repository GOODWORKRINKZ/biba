services:
  biba-controller:
    image: ghcr.io/goodworkrinkz/biba/biba-controller:${BIBA_IMAGE_TAG:-latest}
    pull_policy: always
    build:
      context: ./biba-controller
    privileged: true
    restart: unless-stopped
    devices:
      - /dev/ttyS0:/dev/ttyS0
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/gpiomem:/dev/gpiomem
      - /dev/vcio:/dev/vcio
      - /dev/mem:/dev/mem
    ports:
      - ${MOTOR_TEST_API_PORT:-8765}:${MOTOR_TEST_API_PORT:-8765}
    volumes:
      - biba-controller-data:/data
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*main' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      CRSF_PORT: /dev/ttyS0
      BMS_PORT: /dev/ttyUSB0
      BMS_TRANSPORT: ${BMS_TRANSPORT:-BLE}
      BMS_BLE_ADDRESS: ${BMS_BLE_ADDRESS:-}
      BMS_BLE_SERVICE_UUID: ${BMS_BLE_SERVICE_UUID:-0000fff0-0000-1000-8000-00805f9b34fb}
      BMS_BLE_WRITE_UUID: ${BMS_BLE_WRITE_UUID:-0000fff2-0000-1000-8000-00805f9b34fb}
      BMS_BLE_NOTIFY_UUID: ${BMS_BLE_NOTIFY_UUID:-0000fff1-0000-1000-8000-00805f9b34fb}
      BMS_BLE_TIMEOUT_S: ${BMS_BLE_TIMEOUT_S:-1.5}
      LOG_LEVEL: INFO
      MOTOR_DRIVER_TYPE: ${MOTOR_DRIVER_TYPE:-BTS7960}
      BTS7960_PWM_MODE: ${BTS7960_PWM_MODE:-SOFTWARE}
      CH_STEERING: 3
      CH_THROTTLE: 1
      CH_ARM: 4
      CH_SPEED_MODE: ${CH_SPEED_MODE:-5}
      CH_DRIVE_MODE: ${CH_DRIVE_MODE:-6}
      THROTTLE_FILTER_MODE: ${THROTTLE_FILTER_MODE:-NONE}
      THROTTLE_KALMAN_PROCESS_NOISE: ${THROTTLE_KALMAN_PROCESS_NOISE:-0.02}
      THROTTLE_KALMAN_MEASUREMENT_NOISE: ${THROTTLE_KALMAN_MEASUREMENT_NOISE:-0.5}
      SPEED_MODE_LOW_THRESHOLD: ${SPEED_MODE_LOW_THRESHOLD:--0.3}
      SPEED_MODE_HIGH_THRESHOLD: ${SPEED_MODE_HIGH_THRESHOLD:-0.3}
      SPEED_MODE_SLOW_SCALE: ${SPEED_MODE_SLOW_SCALE:-0.3333333333333333}
      SPEED_MODE_MEDIUM_SCALE: ${SPEED_MODE_MEDIUM_SCALE:-0.6666666666666666}
      SPEED_MODE_FAST_SCALE: ${SPEED_MODE_FAST_SCALE:-1.0}
      DRIVE_MODE_LOW_THRESHOLD: ${DRIVE_MODE_LOW_THRESHOLD:--0.3}
      DRIVE_MODE_HIGH_THRESHOLD: ${DRIVE_MODE_HIGH_THRESHOLD:-0.3}
      DRIVE_MODE_STEERING_DEADBAND: ${DRIVE_MODE_STEERING_DEADBAND:-0.05}
      DRIVE_MODE_STEERING_LIMIT: ${DRIVE_MODE_STEERING_LIMIT:-1.0}
      DRIVE_MODE_YAW_RATE_MAX_DPS: ${DRIVE_MODE_YAW_RATE_MAX_DPS:-90.0}
      DRIVE_MODE_YAW_RATE_KP: ${DRIVE_MODE_YAW_RATE_KP:-0.01}
      DRIVE_MODE_YAW_RATE_KI: ${DRIVE_MODE_YAW_RATE_KI:-0.0}
      DRIVE_MODE_YAW_RATE_KD: ${DRIVE_MODE_YAW_RATE_KD:-0.001}
      DRIVE_MODE_YAW_RATE_DEADBAND_DPS: ${DRIVE_MODE_YAW_RATE_DEADBAND_DPS:-4.0}
      DRIVE_MODE_YAW_RATE_FILTER_HZ: ${DRIVE_MODE_YAW_RATE_FILTER_HZ:-5.0}
      DRIVE_MODE_STABILIZATION_MIN_THROTTLE: ${DRIVE_MODE_STABILIZATION_MIN_THROTTLE:-0.1}
      DRIVE_MODE_NEUTRAL_STABILIZATION_STEERING_LIMIT: ${DRIVE_MODE_NEUTRAL_STABILIZATION_STEERING_LIMIT:-0.12}
      DRIVE_MODE_NEUTRAL_STABILIZATION_MAX_THROTTLE: ${DRIVE_MODE_NEUTRAL_STABILIZATION_MAX_THROTTLE:-0.25}
      IMU_ENABLED: ${IMU_ENABLED:-0}
      IMU_I2C_BUS: ${IMU_I2C_BUS:-1}
      IMU_I2C_ADDRESS: ${IMU_I2C_ADDRESS:-104}
      IMU_EXPECTED_CHIP_ID: ${IMU_EXPECTED_CHIP_ID:-209}
      IMU_SAMPLE_RATE_HZ: ${IMU_SAMPLE_RATE_HZ:-100.0}
      IMU_STALE_TIMEOUT_S: ${IMU_STALE_TIMEOUT_S:-0.2}
      IMU_GYRO_BIAS_CALIBRATION_S: ${IMU_GYRO_BIAS_CALIBRATION_S:-1.0}
      IMU_GYRO_Z_SIGN: ${IMU_GYRO_Z_SIGN:-1.0}
      BEACON_ENABLED: ${BEACON_ENABLED:-1}
      BEACON_DELAY_S: ${BEACON_DELAY_S:-300}
      CH_BEACON: ${CH_BEACON:-7}
      CH_MUTE: ${CH_MUTE:-9}
      CH_TRIM: ${CH_TRIM:-8}
      MOTOR_TRIM_MAX_EFFECT: ${MOTOR_TRIM_MAX_EFFECT:-0.30}
      MOTOR_TRIM_CONFIRM_HOLD_S: ${MOTOR_TRIM_CONFIRM_HOLD_S:-5.0}
      MOTOR_TRIM_SETTINGS_PATH: ${MOTOR_TRIM_SETTINGS_PATH:-/data/motor-trim.json}
      PID_TUNING_SETTINGS_PATH: ${PID_TUNING_SETTINGS_PATH:-/data/pid-tuning.json}
      ENABLE_RC_MELODIES: ${ENABLE_RC_MELODIES:-0}
      CH_MELODY: ${CH_MELODY:-8}
      STARTUP_MELODY: ${STARTUP_MELODY:-biba_signature}
      SOUND_MODE: ${SOUND_MODE:-synth}
      MOTOR_TEST_API_ENABLED: ${MOTOR_TEST_API_ENABLED:-1}
      MOTOR_TEST_API_HOST: ${MOTOR_TEST_API_HOST:-0.0.0.0}
      MOTOR_TEST_API_PORT: ${MOTOR_TEST_API_PORT:-8765}
      RAMP_ACCEL_RATE: ${RAMP_ACCEL_RATE:-2.0}
      PWM_FREQUENCY_HZ: ${PWM_FREQUENCY_HZ:-20000}
      RAMP_DECEL_RATE: ${RAMP_DECEL_RATE:-2.0}
      RAMP_REVERSE_DECEL_RATE: ${RAMP_REVERSE_DECEL_RATE:-0.5}
      RAMP_ZERO_HOLD_S: ${RAMP_ZERO_HOLD_S:-0.15}
      MOTOR_DEADBAND: ${MOTOR_DEADBAND:-0.05}
      LEFT_MOTOR_RPWM: ${LEFT_MOTOR_RPWM:-12}
      LEFT_MOTOR_LPWM: ${LEFT_MOTOR_LPWM:-18}
      LEFT_MOTOR_REN: ${LEFT_MOTOR_REN:-23}
      LEFT_MOTOR_LEN: ${LEFT_MOTOR_LEN:-24}
      LEFT_MOTOR_ENABLED: ${LEFT_MOTOR_ENABLED:-1}
      RIGHT_MOTOR_RPWM: ${RIGHT_MOTOR_RPWM:-19}
      RIGHT_MOTOR_LPWM: ${RIGHT_MOTOR_LPWM:-13}
      RIGHT_MOTOR_REN: ${RIGHT_MOTOR_REN:-20}
      RIGHT_MOTOR_LEN: ${RIGHT_MOTOR_LEN:-21}
      RIGHT_MOTOR_ENABLED: ${RIGHT_MOTOR_ENABLED:-1}
      MOTOR1_INVERTED: ${MOTOR1_INVERTED:-1}
      MOTOR2_INVERTED: ${MOTOR2_INVERTED:-0}
      MOTOR_CURRENT_LIMITING_ENABLED: ${MOTOR_CURRENT_LIMITING_ENABLED:-0}
      MOTOR_CURRENT_SENSE_ENABLED: ${MOTOR_CURRENT_SENSE_ENABLED:-0}
      MOTOR_CURRENT_SENSE_I2C_ADDRESS: ${MOTOR_CURRENT_SENSE_I2C_ADDRESS:-72}
      LEFT_MOTOR_CURRENT_SENSE_FORWARD_CHANNEL: ${LEFT_MOTOR_CURRENT_SENSE_FORWARD_CHANNEL:-2}
      LEFT_MOTOR_CURRENT_SENSE_REVERSE_CHANNEL: ${LEFT_MOTOR_CURRENT_SENSE_REVERSE_CHANNEL:-3}
      RIGHT_MOTOR_CURRENT_SENSE_FORWARD_CHANNEL: ${RIGHT_MOTOR_CURRENT_SENSE_FORWARD_CHANNEL:-0}
      RIGHT_MOTOR_CURRENT_SENSE_REVERSE_CHANNEL: ${RIGHT_MOTOR_CURRENT_SENSE_REVERSE_CHANNEL:-1}
      MOTOR_CURRENT_SENSE_SAMPLE_RATE_HZ: ${MOTOR_CURRENT_SENSE_SAMPLE_RATE_HZ:-32}
      MOTOR_CURRENT_SENSE_GAIN: ${MOTOR_CURRENT_SENSE_GAIN:-1}
      LEFT_MOTOR_CURRENT_SENSE_ZERO_OFFSET_V: ${LEFT_MOTOR_CURRENT_SENSE_ZERO_OFFSET_V:-0.0}
      RIGHT_MOTOR_CURRENT_SENSE_ZERO_OFFSET_V: ${RIGHT_MOTOR_CURRENT_SENSE_ZERO_OFFSET_V:-0.0}
      LEFT_MOTOR_CURRENT_SENSE_AMPS_PER_VOLT: ${LEFT_MOTOR_CURRENT_SENSE_AMPS_PER_VOLT:-1.0}
      RIGHT_MOTOR_CURRENT_SENSE_AMPS_PER_VOLT: ${RIGHT_MOTOR_CURRENT_SENSE_AMPS_PER_VOLT:-1.0}
      MOTOR_CURRENT_TRACE_ENABLED: ${MOTOR_CURRENT_TRACE_ENABLED:-0}
      MOTOR_CURRENT_TRACE_PATH: ${MOTOR_CURRENT_TRACE_PATH:-/data/current-trace.jsonl}
      MOTOR_CURRENT_TRACE_POST_ROLL_S: ${MOTOR_CURRENT_TRACE_POST_ROLL_S:-2.0}
      MOTOR_CURRENT_TRACE_MIN_INTERVAL_S: ${MOTOR_CURRENT_TRACE_MIN_INTERVAL_S:-0.0}

volumes:
  biba-controller-data: