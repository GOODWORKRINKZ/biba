services:
  biba-controller:
    image: ghcr.io/goodworkrinkz/biba/biba-controller:${BIBA_IMAGE_TAG:-latest}
    pull_policy: always
    build:
      context: ./biba-controller
    privileged: true
    restart: unless-stopped
    devices:
      - /dev/ttyAMA0:/dev/ttyAMA0
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/gpiomem:/dev/gpiomem
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*main' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      CRSF_PORT: /dev/ttyAMA0
      BMS_PORT: /dev/ttyUSB0
      LOG_LEVEL: INFO
      CH_STEERING: 0
      CH_THROTTLE: 1
      CH_ARM: 4
      MOTOR1_INVERTED: 0
      MOTOR2_INVERTED: 0