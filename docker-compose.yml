services:
  biba-controller:
    image: ghcr.io/goodworkrinkz/biba/biba-controller:${BIBA_IMAGE_TAG:-latest}
    pull_policy: always
    build:
      context: ./biba-controller
    privileged: true
    restart: unless-stopped
    devices:
      - /dev/ttyS0:/dev/ttyS0
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/gpiomem:/dev/gpiomem
      - /dev/vcio:/dev/vcio
      - /dev/mem:/dev/mem
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*main' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      CRSF_PORT: /dev/ttyS0
      BMS_PORT: /dev/ttyUSB0
      LOG_LEVEL: INFO
      MOTOR_DRIVER_TYPE: ${MOTOR_DRIVER_TYPE:-BTS7960}
      CH_STEERING: 3
      CH_THROTTLE: 1
      CH_ARM: 4
      BEACON_ENABLED: ${BEACON_ENABLED:-1}
      BEACON_DELAY_S: ${BEACON_DELAY_S:-300}
      CH_BEACON: ${CH_BEACON:-7}
      CH_MELODY: ${CH_MELODY:-8}
      STARTUP_MELODY: ${STARTUP_MELODY:-imperial_march}
      RAMP_ACCEL_RATE: ${RAMP_ACCEL_RATE:-2.0}
      RAMP_DECEL_RATE: ${RAMP_DECEL_RATE:-3.0}
      MOTOR_DEADBAND: ${MOTOR_DEADBAND:-0.05}
      LEFT_MOTOR_RPWM: ${LEFT_MOTOR_RPWM:-18}
      LEFT_MOTOR_LPWM: ${LEFT_MOTOR_LPWM:-13}
      LEFT_MOTOR_REN: ${LEFT_MOTOR_REN:-23}
      LEFT_MOTOR_LEN: ${LEFT_MOTOR_LEN:-23}
      RIGHT_MOTOR_RPWM: ${RIGHT_MOTOR_RPWM:-12}
      RIGHT_MOTOR_LPWM: ${RIGHT_MOTOR_LPWM:-16}
      RIGHT_MOTOR_REN: ${RIGHT_MOTOR_REN:-20}
      RIGHT_MOTOR_LEN: ${RIGHT_MOTOR_LEN:-20}
      MOTOR1_INVERTED: 0
      MOTOR2_INVERTED: 0